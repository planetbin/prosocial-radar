name: Codex Apply Research Profile Tuning

on:
  push:
    branches:
      - codex/research-profile-20260504
    paths:
      - .github/workflows/codex_apply_research_profile.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/research-profile-20260504
      - name: Apply code changes
        run: |
          python - <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding="utf-8")

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8")

          def replace_once(path, old, new):
              text = read(path)
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f"Pattern not found in {path}: {old[:80]!r}")
              write(path, text.replace(old, new, 1))

          def insert_after(path, marker, addition):
              text = read(path)
              if addition.strip() in text:
                  return
              if marker not in text:
                  raise RuntimeError(f"Marker not found in {path}: {marker[:80]!r}")
              write(path, text.replace(marker, marker + addition, 1))

          # filter.py: annotate every candidate with the research profile fields.
          insert_after(
              "prosocial_radar/filter.py",
              ")\n\nlog = logging.getLogger(__name__)",
              "\nfrom .research_profile import annotate_research_profile\n",
          )
          replace_once(
              "prosocial_radar/filter.py",
              '    paper["filter_reason"] = _filter_reason(topic, tags, high_quality)\n    return paper',
              '    paper["filter_reason"] = _filter_reason(topic, tags, high_quality)\n    annotate_research_profile(paper)\n    return paper',
          )

          # scorer.py: fold research alignment into final ranking while keeping the base score transparent.
          insert_after(
              "prosocial_radar/scorer.py",
              "from typing import Dict, List\n",
              "\nfrom .research_profile import annotate_research_profile\n",
          )
          replace_once(
              "prosocial_radar/scorer.py",
              '    penalty = _noise_penalty(paper)\n    final = max(0.0, min(round(topic + cit + rec + br + quality - penalty, 1), 100.0))\n    return {',
              '    penalty = _noise_penalty(paper)\n    annotate_research_profile(paper)\n    research = float(paper.get("research_alignment_adjustment") or 0.0)\n    final = max(0.0, min(round(topic + cit + rec + br + quality + research - penalty, 1), 100.0))\n    return {',
          )
          insert_after(
              "prosocial_radar/scorer.py",
              '        "quality": round(quality, 1),\n',
              '        "research_alignment": round(research, 1),\n',
          )
          replace_once(
              "prosocial_radar/scorer.py",
              '        "score {final:.1f}: topic {topic:.1f}/55, citations {citation:.1f}/12, recency {recency:.1f}/18, breadth {breadth:.1f}/6, quality {quality:.1f}/4, penalty -{penalty:.1f}".format(**components)',
              '        "score {final:.1f}: topic {topic:.1f}/55, citations {citation:.1f}/12, recency {recency:.1f}/18, breadth {breadth:.1f}/6, quality {quality:.1f}/4, research fit {research_alignment:+.1f}, penalty -{penalty:.1f}".format(**components)',
          )
          replace_once(
              "prosocial_radar/scorer.py",
              '    if paper.get("is_high_quality"):\n        parts.append("target-journal quality badge")\n    return "; ".join(parts)',
              '    if paper.get("is_high_quality"):\n        parts.append("target-journal quality badge")\n    if paper.get("research_use_tags"):\n        parts.append("research profile: " + str(paper.get("research_use_tags")))\n    if paper.get("research_takeaway"):\n        parts.append("why worth seeing: " + str(paper.get("research_takeaway")))\n    return "; ".join(parts)',
          )
          insert_after(
              "prosocial_radar/scorer.py",
              '        p["score_quality"] = components["quality"]\n',
              '        p["score_research_alignment"] = components["research_alignment"]\n',
          )
          replace_once(
              "prosocial_radar/scorer.py",
              '            f"quality={components[\'quality\']:.1f}; "\n            f"penalty=-{components[\'penalty\']:.1f}"',
              '            f"quality={components[\'quality\']:.1f}; "\n            f"research_alignment={components[\'research_alignment\']:+.1f}; "\n            f"penalty=-{components[\'penalty\']:.1f}"',
          )

          # output.py: persist and print the new fields.
          insert_after(
              "prosocial_radar/output.py",
              '    "score_breadth",\n',
              '    "score_research_alignment",\n    "research_alignment_score",\n    "research_alignment_penalty",\n    "research_alignment_reason",\n    "research_use_tags",\n    "research_takeaway",\n    "email_section",\n',
          )
          insert_after(
              "prosocial_radar/output.py",
              '        reason = (p.get("selection_reason") or p.get("filter_reason") or "")[:140]\n',
              '        research_tags = p.get("research_use_tags", "")\n        research_fit = p.get("research_alignment_score", "")\n        takeaway = (p.get("research_takeaway") or "")[:150]\n',
          )
          insert_after(
              "prosocial_radar/output.py",
              '        if reason:\n            print(f"       why: {reason}")\n',
              '        if research_tags:\n            print(f"       research fit: {research_fit} | {research_tags}")\n        if takeaway:\n            print(f"       worth seeing: {takeaway}")\n',
          )

          # push.py: show research-fit fields and group the digest into task sections.
          insert_after(
              "prosocial_radar/push.py",
              'TAG_COLORS = {\n    "altruism": "#d97706",\n    "empathy": "#7c3aed",\n    "cooperation": "#059669",\n    "economic_games": "#dc2626",\n    "development": "#2563eb",\n    "neuroscience": "#0891b2",\n    "decision_making": "#ea580c",\n    "moral": "#65a30d",\n}\n',
              '\nRESEARCH_TAG_COLORS = {\n    "aging_prosociality": "#0f766e",\n    "age_comparison": "#0d9488",\n    "helping_decision": "#2563eb",\n    "sharing": "#16a34a",\n    "comforting": "#db2777",\n    "cost_mechanism": "#ea580c",\n    "familiarity_mechanism": "#7c3aed",\n    "ses_resource_mechanism": "#a16207",\n    "value_based_decision": "#dc2626",\n    "attentional_mechanism": "#0891b2",\n    "neural_mechanism": "#4f46e5",\n    "measurement_validation": "#475569",\n    "picture_vignette_method": "#64748b",\n    "psychometrics": "#334155",\n    "meta_analysis": "#9333ea",\n    "computational_modeling_bridge": "#f59e0b",\n    "psychology_priority": "#0369a1",\n}\n\nSECTION_INFO = {\n    "top": ("Today\'s must-read", "Highest-ranked papers after topic relevance and profile-fit reranking."),\n    "aging_lifespan": ("Aging and lifespan prosociality", "Older-adult, age-comparison, and lifespan papers closest to the core research line."),\n    "neural_attention": ("Neural and attentional mechanisms", "Brain, gaze, attention, and perception-to-helping decision leads."),\n    "measurement_methods": ("Measurement and methods", "Scale, picture/vignette, psychometric, review, and meta-analysis material."),\n    "computational_modeling": ("Computational modeling", "Model-based, utility, reinforcement-learning, and value-decision bridges."),\n    "mechanism_leads": ("Mechanism leads", "Cost, familiarity, SES/resources, and value-based decision explanations."),\n    "general_prosocial": ("General prosocial behavior", "Relevant but less specifically aligned papers."),\n    "peripheral_watch": ("Peripheral watch", "Applied or policy-facing papers to keep only if strategically useful."),\n}\n\nSECTION_ORDER = [\n    "aging_lifespan",\n    "neural_attention",\n    "measurement_methods",\n    "computational_modeling",\n    "mechanism_leads",\n    "general_prosocial",\n    "peripheral_watch",\n]\n',
          )
          insert_after(
              "prosocial_radar/push.py",
              'def _tag_badges(tags_str: str) -> str:\n    tags = [t.strip() for t in (tags_str or "").split(";") if t.strip()]\n    return "".join(\n        _badge(t.replace("_", " "), TAG_COLORS.get(t, "#6b7280"))\n        for t in tags\n    )\n\n',
              'def _research_tag_badges(tags_str: str) -> str:\n    tags = [t.strip() for t in (tags_str or "").split(";") if t.strip()]\n    return "".join(\n        _badge(t.replace("_", " "), RESEARCH_TAG_COLORS.get(t, "#475569"), "20")\n        for t in tags\n    )\n\n',
          )
          insert_after(
              "prosocial_radar/push.py",
              '    tags = p.get("topic_tags", "")\n',
              '    research_tags = p.get("research_use_tags", "")\n    research_takeaway = p.get("research_takeaway", "")\n    research_fit = p.get("research_alignment_score")\n',
          )
          replace_once(
              "prosocial_radar/push.py",
              '    score_str = f"{score:.0f}" if isinstance(score, (int, float)) else "-"\n',
              '    score_str = f"{score:.0f}" if isinstance(score, (int, float)) else "-"\n    fit_str = f"{research_fit:.0f}" if isinstance(research_fit, (int, float)) else "-"\n',
          )
          insert_after(
              "prosocial_radar/push.py",
              '        _detail("Why selected", p.get("selection_reason") or p.get("filter_reason", "")),\n',
              '        _detail("Why worth seeing", research_takeaway),\n',
          )
          replace_once(
              "prosocial_radar/push.py",
              '        f\'&nbsp;|&nbsp;Citations: <strong>{cite_str}</strong></span></div>\'\n',
              '        f\'&nbsp;|&nbsp;Citations: <strong>{cite_str}</strong>\'\n        f\'&nbsp;|&nbsp;Fit: <strong>{fit_str}</strong></span></div>\'\n',
          )
          replace_once(
              "prosocial_radar/push.py",
              '        f\'<div style="margin-bottom:8px;">{method_html}{_tag_badges(tags)}</div>\'\n',
              '        f\'<div style="margin-bottom:8px;">{method_html}{_tag_badges(tags)}{_research_tag_badges(research_tags)}</div>\'\n',
          )
          insert_after(
              "prosocial_radar/push.py",
              'def render_email(papers: List[Dict], total_found: int) -> str:\n',
              '    def section_html(section_key: str, ranked: List[tuple[int, Dict]]) -> str:\n        if not ranked:\n            return ""\n        title, desc = SECTION_INFO.get(section_key, SECTION_INFO["general_prosocial"])\n        cards = "".join(_paper_card(rank, paper) for rank, paper in ranked)\n        return (\n            f\'<div style="margin:22px 0 10px;">\'\n            f\'<h2 style="margin:0 0 4px;font-size:16px;color:#0f172a;">{html.escape(title)}</h2>\'\n            f\'<p style="margin:0 0 12px;font-size:12px;color:#64748b;">{html.escape(desc)}</p>\'\n            f\'{cards}</div>\'\n        )\n\n    ranked = list(enumerate(papers, 1))\n    top = ranked[:5]\n    top_ids = {id(paper) for _, paper in top}\n    grouped = {key: [] for key in SECTION_ORDER}\n    for rank, paper in ranked[5:]:\n        if id(paper) in top_ids:\n            continue\n        key = str(paper.get("email_section") or "general_prosocial")\n        if key not in grouped:\n            key = "general_prosocial"\n        grouped[key].append((rank, paper))\n\n',
          )
          replace_once(
              "prosocial_radar/push.py",
              '    cards_html = "".join(_paper_card(i + 1, p) for i, p in enumerate(papers))\n',
              '    cards_html = section_html("top", top) + "".join(section_html(key, grouped[key]) for key in SECTION_ORDER)\n',
          )
          replace_once(
              "prosocial_radar/push.py",
              "<h1 style=\"margin:0 0 8px;font-size:22px;font-weight:700;\">Prosocial Research Radar</h1>",
              "<h1 style=\"margin:0 0 8px;font-size:22px;font-weight:700;\">Research-Focused Prosocial Radar</h1>",
          )

          # feedback.py: carry research-use tags into issue feedback and similarity learning.
          insert_after(
              "prosocial_radar/feedback.py",
              '    tags = str(paper.get("topic_tags") or "").strip()\n',
              '    research_tags = str(paper.get("research_use_tags") or "").strip()\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        f"topic_tags: {tags}",\n',
              '        f"research_use_tags: {research_tags}",\n',
          )
          replace_once(
              "prosocial_radar/feedback.py",
              '    allowed = {"rating", "pmid", "doi", "source", "source_id", "title", "journal", "topic_tags", "score"}\n',
              '    allowed = {"rating", "pmid", "doi", "source", "source_id", "title", "journal", "topic_tags", "research_use_tags", "score"}\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        "topic_tags": fields.get("topic_tags", ""),\n',
              '        "research_use_tags": fields.get("research_use_tags", ""),\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '    paper_tags = _tags(paper.get("topic_tags") or "")\n',
              '    paper_research_tags = _tags(paper.get("research_use_tags") or "")\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        item_tags = _tags(item.get("topic_tags") or "")\n',
              '        item_research_tags = _tags(item.get("research_use_tags") or "")\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        if shared:\n            adjustment += min(len(shared) * 1.5, 4.5)\n',
              '        shared_research = paper_research_tags & item_research_tags\n        if shared_research:\n            adjustment += min(len(shared_research) * 2.0, 6.0)\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        item_tags = _tags(item.get("topic_tags") or "")\n',
              '        item_research_tags = _tags(item.get("research_use_tags") or "")\n',
          )
          insert_after(
              "prosocial_radar/feedback.py",
              '        if shared:\n            adjustment -= min(len(shared) * 2.0, 6.0)\n',
              '        shared_research = paper_research_tags & item_research_tags\n        if shared_research:\n            adjustment -= min(len(shared_research) * 2.5, 8.0)\n',
          )

          # profiles/default.yml: query and tag expansion around public, abstracted research themes.
          replace_once(
              "profiles/default.yml",
              '    "agent-based model"[tiab] OR "choice model"[tiab] OR "utility model"[tiab])',
              '    "agent-based model"[tiab] OR "choice model"[tiab] OR "utility model"[tiab] OR\n    "older adult"[tiab] OR "older adults"[tiab] OR aging[tiab] OR ageing[tiab] OR\n    lifespan[tiab] OR "age differences"[tiab] OR attention[tiab] OR attentional[tiab] OR\n    gaze[tiab] OR "eye tracking"[tiab] OR "cost-benefit"[tiab] OR familiarity[tiab] OR\n    psychometric[tiab] OR validation[tiab] OR "picture-based"[tiab] OR vignette[tiab])',
          )
          insert_after(
              "profiles/default.yml",
              '    - name: decision_models\n      query: drift diffusion Bayesian model agent based model choice model altruism cooperation\n',
              '    - name: aging_prosociality\n      query: older adults aging prosocial behavior helping sharing comforting\n    - name: age_helping_neural\n      query: younger older adults helping prosocial neural attention gaze\n    - name: measurement_prosociality\n      query: prosociality measure scale validation psychometric picture vignette\n    - name: cost_familiarity_prosocial\n      query: prosocial helping sharing cost familiarity social distance older adults\n',
          )
          insert_after(
              "profiles/default.yml",
              '  - computational brain & behavior\n',
              '  - psychology and aging\n  - the gerontologist\n  - journal of gerontology: psychological sciences\n  - journals of gerontology series b: psychological sciences and social sciences\n  - aging neuropsychology and cognition\n  - aging & mental health\n  - acta psychologica\n  - scientific reports\n',
          )
          insert_after(
              "profiles/default.yml",
              "      - '\\bhelping behaviour\\b'\n      - '\\bhelping\\b'\n",
              "      - '\\bcomforting\\b'\n      - '\\bemotional support\\b'\n",
          )
          insert_after(
              "profiles/default.yml",
              "      - '\\breward sensitivity\\b'\n",
              "      - '\\bcost[- ]benefit\\b'\n      - '\\bcostly\\b'\n      - '\\bfamiliarity\\b'\n      - '\\bsocial distance\\b'\n      - '\\bvalue[- ]based\\b'\n      - '\\battention\\b'\n      - '\\battentional\\b'\n      - '\\bgaze\\b'\n      - '\\beye[- ]tracking\\b'\n      - '\\bpsychometric\\w*\\b'\n      - '\\bmeasurement invariance\\b'\n",
          )
          insert_after(
              "profiles/default.yml",
              "      - '\\bdevelopmental\\b'\n",
              "      - '\\bolder adult\\w*\\b'\n      - '\\baging\\b'\n      - '\\bageing\\b'\n      - '\\blifespan\\b'\n      - '\\bage difference\\w*\\b'\n",
          )
          insert_after(
              "profiles/default.yml",
              "    moral:\n      - '\\bmoral\\b'\n      - '\\bethics\\b'\n",
              "    aging:\n      - '\\bolder adult\\w*\\b'\n      - '\\baging\\b'\n      - '\\bageing\\b'\n      - '\\blifespan\\b'\n    attention:\n      - '\\battention\\b'\n      - '\\battentional\\b'\n      - '\\bgaze\\b'\n      - '\\beye[- ]tracking\\b'\n    measurement:\n      - '\\bpsychometric\\w*\\b'\n      - '\\bvalidation\\b'\n      - '\\bscale\\b'\n      - '\\bmeasurement invariance\\b'\n      - '\\bpicture[- ]based\\b'\n      - '\\bvignette\\b'\n    cost_familiarity:\n      - '\\bcost[- ]benefit\\b'\n      - '\\bcostly\\b'\n      - '\\bfamiliarity\\b'\n      - '\\bsocial distance\\b'\n      - '\\bvalue[- ]based\\b'\n",
          )
          PY
      - name: Compile check
        run: python -m compileall -q prosocial_radar run_radar.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prosocial_radar profiles/default.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply research-profile tuning"
            git push origin HEAD:codex/research-profile-20260504
          fi
