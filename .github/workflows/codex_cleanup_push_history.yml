name: One-time Radar Push History Cleanup

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/codex_cleanup_push_history.yml"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clear history and committed push outputs
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python - <<'PY'
          import json
          from pathlib import Path

          Path("data").mkdir(exist_ok=True)
          Path("data/sent_history.json").write_text(
              json.dumps(
                  {
                      "sent_pmids": [],
                      "sent_dois": [],
                      "sent_source_ids": [],
                      "log": [],
                  },
                  indent=2,
              )
              + "\n",
              encoding="utf-8",
          )
          PY

          git add data/sent_history.json
          if [ -d outputs ]; then
            find outputs -maxdepth 1 -type f \( \
              -name 'new_papers_*.csv' -o \
              -name 'new_papers_*.json' -o \
              -name 'run_report_*.json' \
            \) -print0 | xargs -0 -r git rm -f
          fi
          git rm -f .github/workflows/codex_cleanup_push_history.yml

          if git diff --staged --quiet; then
            echo "No push history files to clear."
          else
            git commit -m "chore: clear historical radar push results"
            git push
          fi
