name: One-time Delete Non-Master Branches

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/codex_delete_non_main_branches.yml"

permissions:
  contents: write

jobs:
  delete-non-master-branches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete all remote branches except master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

          deleted=0
          while IFS= read -r branch; do
            [ -z "$branch" ] && continue
            [ "$branch" = "HEAD" ] && continue
            if [ "$branch" = "master" ]; then
              echo "Keeping production branch: $branch"
              continue
            fi
            echo "Deleting branch: $branch"
            git push origin --delete "$branch"
            deleted=$((deleted + 1))
          done < <(git for-each-ref refs/remotes/origin --format='%(refname:strip=3)' | sort -u)

          echo "Deleted $deleted non-master branch(es)."

          git rm -f .github/workflows/codex_delete_non_main_branches.yml
          git commit -m "chore: remove one-time branch cleanup workflow"
          git push origin HEAD:master
