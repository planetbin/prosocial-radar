name: Prosocial Radar Master Dry Run

on:
  push:
    branches:
      - master

concurrency:
  group: radar-master-dry-run
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      issues: read
      statuses: write
    steps:
      - name: Publish run URL status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import os, requests
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          response = requests.post(
              f"https://api.github.com/repos/{repo}/statuses/{sha}",
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              json={
                  "state": "pending",
                  "context": "radar-master-dry-run/run",
                  "description": "master dry run started",
                  "target_url": run_url,
              },
              timeout=20,
          )
          response.raise_for_status()
          PY
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -q -r requirements.txt
      - name: Compile check
        id: compile
        continue-on-error: true
        run: python -m compileall -q prosocial_radar run_radar.py
      - name: Run radar without email or AI summaries
        id: radar
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          RADAR_SOURCES: pubmed,openalex
        run: python run_radar.py --top 20 --no-ai --no-push --max 50 > dry_run.log 2>&1
      - name: Build dry-run detail
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json
          from collections import Counter

          def clean(value):
              if value is None:
                  return ""
              return " ".join(str(value).split())

          files = sorted(glob.glob("outputs/new_papers_*.json"))
          report_files = sorted(glob.glob("outputs/run_report_*.json"))
          papers = []
          if files:
              with open(files[-1], encoding="utf-8") as fh:
                  papers = json.load(fh)
          report = {}
          if report_files:
              with open(report_files[-1], encoding="utf-8") as fh:
                  report = json.load(fh)

          top = papers[:20]
          source_counts = Counter(clean(p.get("source") or "unknown") for p in papers)
          tier_counts = Counter(clean(p.get("topic_tier") or "unknown") for p in papers)
          tag_counts = Counter()
          for paper in papers:
              for tag in clean(paper.get("topic_tags")).split(";"):
                  tag = tag.strip()
                  if tag:
                      tag_counts[tag] += 1

          detail = {
              "run_report": report,
              "new_count": len(papers),
              "source_counts": dict(source_counts),
              "tier_counts": dict(tier_counts),
              "tag_counts": dict(tag_counts),
              "top20": top,
          }
          with open("master_dry_run_detail.json", "w", encoding="utf-8") as fh:
              json.dump(detail, fh, ensure_ascii=False, indent=2)

          print("=== RADAR_MASTER_DRY_RUN_BEGIN ===")
          print("SOURCE_COUNTS:", dict(source_counts))
          print("TIER_COUNTS:", dict(tier_counts))
          print("TAG_COUNTS:", dict(tag_counts))
          print("STAGES:", json.dumps(report.get("stages", {}), ensure_ascii=False, sort_keys=True))
          print("=== RADAR_TOP20_BEGIN ===")
          for idx, paper in enumerate(top, 1):
              print(f"RANK: {idx}")
              for key in [
                  "relevance_score", "source", "source_query", "title", "authors",
                  "first_author_affiliation", "journal", "year", "pmid", "doi", "url",
                  "topic_tier", "matched_title_anchor_terms", "matched_core_terms",
                  "matched_paradigm_terms", "matched_mechanism_terms", "topic_tags",
                  "keywords", "selection_reason",
              ]:
                  print(f"{key.upper()}: {clean(paper.get(key))}")
              print("---")
          print("=== RADAR_TOP20_END ===")
          print("=== RADAR_MASTER_DRY_RUN_END ===")
          PY
      - name: Upload dry-run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: master-dry-run-detail
          path: |
            dry_run.log
            master_dry_run_detail.json
          if-no-files-found: warn
      - name: Publish dry-run statuses
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COMPILE_OUTCOME: ${{ steps.compile.outcome }}
          RADAR_OUTCOME: ${{ steps.radar.outcome }}
        run: |
          python - <<'PY'
          import json, os, requests, sys
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          url = f"https://api.github.com/repos/{repo}/statuses/{sha}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def compact(text, limit=120):
              return " ".join(str(text or "").split())[:limit]

          def post(context, description, state="success"):
              response = requests.post(url, headers=headers, json={
                  "state": state,
                  "context": context[:250],
                  "description": compact(description, 130),
                  "target_url": run_url,
              }, timeout=20)
              response.raise_for_status()

          detail = {}
          try:
              with open("master_dry_run_detail.json", encoding="utf-8") as fh:
                  detail = json.load(fh)
          except Exception:
              detail = {}

          stages = ((detail.get("run_report") or {}).get("stages") or {}) if isinstance(detail, dict) else {}
          counts = ((stages.get("source_fetch") or {}).get("counts") or {}) if isinstance(stages, dict) else {}
          source_counts = detail.get("source_counts") or {}
          tag_counts = detail.get("tag_counts") or {}
          top = detail.get("top20") or []
          state = "success" if os.environ.get("COMPILE_OUTCOME") == "success" and os.environ.get("RADAR_OUTCOME") == "success" else "failure"

          meta = (
              f"raw={counts.get('raw_total','?')} unique={stages.get('unique_after_dedup','?')} "
              f"passed={stages.get('after_filter','?')} new={stages.get('new_after_history','?')} "
              f"pubmed={counts.get('pubmed_details','?')} openalex={counts.get('openalex_details','?')}"
          )
          post("radar-master-dry-run/meta", meta, state)
          post("radar-master-dry-run/sources", source_counts, state)
          post("radar-master-dry-run/computational", f"computational_modeling={tag_counts.get('computational_modeling', 0)}", state)
          for idx, paper in enumerate(top[:10], 1):
              title = compact(paper.get("title"), 70)
              desc = f"{paper.get('source','?')} | {paper.get('topic_tags','') or paper.get('topic_tier','')}"
              post(f"radar-master-dry-run/top-{idx:02d} {paper.get('relevance_score','?')} {title}", desc, state)
          post("radar-master-dry-run/run", "master dry run finished", state)
          if state != "success":
              try:
                  print(open("dry_run.log", encoding="utf-8").read()[-4000:])
              except Exception:
                  pass
              sys.exit(1)
          PY
