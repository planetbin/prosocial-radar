name: Codex Patch Research Profile Tuning

on:
  push:
    branches:
      - codex/research-profile-20260504
    paths:
      - .github/workflows/codex_patch_research_profile.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/research-profile-20260504
      - name: Tune research-profile ranking rules
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          rp = Path("prosocial_radar/research_profile.py")
          text = rp.read_text(encoding="utf-8")

          age_block = '''    (
        "age_comparison",
        4.0,
        [
            r"\\byounger adults? (?:and|vs\\.?|versus) older adults?\\b",
            r"\\bolder adults? (?:and|vs\\.?|versus) younger adults?\\b",
            r"\\byounger and older adults?\\b",
            r"\\byoung and older adults?\\b",
            r"\\badult age difference\\w*\\b",
            r"\\bage differences? between younger and older adults?\\b",
        ],
    ),'''
          text, n = re.subn(
              r'    \(\n        "age_comparison",\n        4\.0,\n        \[\n.*?        \],\n    \),',
              age_block,
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise RuntimeError("age_comparison block not replaced")

          ses_block = '''    (
        "ses_resource_mechanism",
        3.0,
        [
            r"\\bsocioeconomic\\b",
            r"\\bsocioeconomic status\\b",
            r"\\bSES\\b",
            r"\\bincome\\b",
            r"\\bwealth\\b",
            r"\\bfinancial strain\\b",
            r"\\bresource inequality\\b",
        ],
    ),'''
          text, n = re.subn(
              r'    \(\n        "ses_resource_mechanism",\n        4\.0,\n        \[\n.*?        \],\n    \),',
              ses_block,
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise RuntimeError("ses_resource_mechanism block not replaced")

          measurement_block = '''    (
        "measurement_validation",
        4.0,
        [
            r"\\bpsychometric validation\\b",
            r"\\bscale validation\\b",
            r"\\bmeasure validation\\b",
            r"\\binstrument validation\\b",
            r"\\bvalidated scale\\b",
            r"\\bscale development\\b",
            r"\\binstrument development\\b",
            r"\\bmeasure development\\b",
            r"\\bmeasurement invariance\\b",
        ],
    ),'''
          text, n = re.subn(
              r'    \(\n        "measurement_validation",\n        4\.0,\n        \[\n.*?        \],\n    \),',
              measurement_block,
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise RuntimeError("measurement_validation block not replaced")

          if "LOW_VALUE_PUBLICATION_PATTERNS" not in text:
              insert_after = '''PERIPHERAL_PATTERNS = [
    r"\\blocal government\\b",
    r"\\bpublic administration\\b",
    r"\\bpublic policy\\b",
    r"\\bnonprofit sector\\b",
    r"\\bvoluntary sector\\b",
    r"\\bwillingness to donate\\b",
    r"\\bsocial capital\\b",
    r"\\bhometown tax\\b",
    r"\\bpublic economics\\b",
    r"\\bprobit model\\b",
    r"\\bordered probit\\b",
]
'''
              extra = '''PERIPHERAL_PATTERNS = [
    r"\\blocal government\\b",
    r"\\bpublic administration\\b",
    r"\\bpublic policy\\b",
    r"\\bnonprofit sector\\b",
    r"\\bvoluntary sector\\b",
    r"\\bwillingness to donate\\b",
    r"\\bsocial capital\\b",
    r"\\bhometown tax\\b",
    r"\\bpublic economics\\b",
    r"\\bprobit model\\b",
    r"\\bordered probit\\b",
]

LOW_VALUE_PUBLICATION_PATTERNS = [
    r"\\beditorial\\b",
    r"\\bcommentary\\b",
    r"\\bprotocol\\b",
]

DEVELOPMENT_ONLY_PATTERNS = [
    r"\\badolescen\\w*\\b",
    r"\\bchildren\\b",
    r"\\bchildhood\\b",
    r"\\byouth\\b",
]

ONLINE_CONTEXT_PATTERNS = [
    r"\\bonline prosocial\\b",
    r"\\bsocial media\\b",
    r"\\bdigital technolog\\w*\\b",
]
'''
              if insert_after not in text:
                  raise RuntimeError("peripheral pattern block not found")
              text = text.replace(insert_after, extra, 1)

          new_penalty = '''def _peripheral_penalty(paper: Dict, tags: List[str], text: str) -> float:
    topic_tags = _existing_tags(paper)
    tagset = set(tags)
    strong_profile_anchor = bool(
        tagset
        & {
            "aging_prosociality",
            "cost_mechanism",
            "familiarity_mechanism",
            "value_based_decision",
            "attentional_mechanism",
            "neural_mechanism",
            "computational_modeling_bridge",
        }
    )
    method_anchor = bool(
        (tagset & {"measurement_validation", "psychometrics", "picture_vignette_method", "meta_analysis"})
        and (tagset & {"aging_prosociality", "helping_decision", "sharing", "comforting"})
    )
    mechanism_or_method_anchor = bool(
        tagset
        & {
            "aging_prosociality",
            "neural_mechanism",
            "attentional_mechanism",
            "computational_modeling_bridge",
            "picture_vignette_method",
            "psychometrics",
            "meta_analysis",
        }
    )
    penalty = 0.0
    if _matches(PERIPHERAL_PATTERNS, text) and not (strong_profile_anchor or method_anchor):
        penalty += 10.0
    if _matches(LOW_VALUE_PUBLICATION_PATTERNS, text):
        penalty += 8.0
    if _matches(DEVELOPMENT_ONLY_PATTERNS, text) and not mechanism_or_method_anchor:
        penalty += 4.0
    if _matches(ONLINE_CONTEXT_PATTERNS, text) and not mechanism_or_method_anchor:
        penalty += 3.0
    if re.search(r"\\b(charitable giving|donat\\w*)\\b", text, re.IGNORECASE) and not (
        tagset & {"aging_prosociality", "helping_decision", "sharing", "comforting", "neural_mechanism", "attentional_mechanism"}
    ):
        penalty += 5.0
    if "altruism" in topic_tags and not ({"aging_prosociality", "helping_decision", "sharing", "comforting"} & tagset):
        penalty += 2.0
    return min(penalty, 18.0)
'''
          text, n = re.subn(
              r'def _peripheral_penalty\(paper: Dict, tags: List\[str\], text: str\) -> float:\n.*?\n\ndef _section',
              new_penalty + "\ndef _section",
              text,
              count=1,
              flags=re.S,
          )
          if n != 1:
              raise RuntimeError("peripheral penalty function not replaced")

          rp.write_text(text, encoding="utf-8")

          profile = Path("profiles/default.yml")
          yml = profile.read_text(encoding="utf-8")
          yml = yml.replace('  - scientific reports\n', '')
          old_measurement = '''    measurement:
      - '\\bpsychometric\\w*\\b'
      - '\\bvalidation\\b'
      - '\\bscale\\b'
      - '\\bmeasurement invariance\\b'
      - '\\bpicture[- ]based\\b'
      - '\\bvignette\\b'
'''
          new_measurement = '''    measurement:
      - '\\bpsychometric\\w*\\b'
      - '\\bscale validation\\b'
      - '\\bscale development\\b'
      - '\\bmeasure validation\\b'
      - '\\binstrument validation\\b'
      - '\\bmeasurement invariance\\b'
      - '\\bpicture[- ]based\\b'
      - '\\bvignette\\b'
      - '\\bfactor analysis\\b'
'''
          if old_measurement in yml:
              yml = yml.replace(old_measurement, new_measurement, 1)
          profile.write_text(yml, encoding="utf-8")
          PY
      - name: Compile check
        run: python -m compileall -q prosocial_radar run_radar.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add prosocial_radar/research_profile.py profiles/default.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Tighten research-profile ranking rules"
            git push origin HEAD:codex/research-profile-20260504
          fi
