name: Prosocial Radar Topic Relevance Preview

on:
  push:
    branches:
      - codex/topic-relevance-20260503

concurrency:
  group: radar-topic-relevance-preview
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Compile check
        run: python -m compileall prosocial_radar run_radar.py
      - name: Run topic relevance preview only
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: |
          set -o pipefail
          python run_radar.py --top 20 --no-ai --no-push | tee preview.log
      - name: Build detailed Top 20 preview
        if: always()
        run: |
          python - <<'PY'
          import glob
          import json

          FIELDS = [
              "rank", "relevance_score", "title", "authors", "first_author_affiliation",
              "journal", "year", "pmid", "doi", "url", "doi_url", "topic_tier",
              "matched_title_anchor_terms", "matched_core_terms", "matched_paradigm_terms",
              "matched_mechanism_terms", "matched_context_terms", "matched_soft_exclude_terms",
              "matched_hard_exclude_terms", "topic_tags", "keywords", "score_breakdown",
              "selection_reason", "filter_reason",
          ]

          def clean(value):
              if value is None:
                  return ""
              return " ".join(str(value).split())

          files = sorted(glob.glob("outputs/new_papers_*.json"))
          papers = []
          if files:
              with open(files[-1], encoding="utf-8") as fh:
                  papers = json.load(fh)[:20]

          detailed = []
          for rank, paper in enumerate(papers, 1):
              row = {field: clean(paper.get(field)) for field in FIELDS if field != "rank"}
              row["rank"] = rank
              row["url"] = row.get("doi_url") or row.get("url")
              detailed.append(row)

          with open("top20_detail.json", "w", encoding="utf-8") as fh:
              json.dump(detailed, fh, ensure_ascii=False, indent=2)

          with open("top20_detail.md", "w", encoding="utf-8") as fh:
              fh.write("# Topic Relevance Preview Top 20\n\n")
              for item in detailed:
                  fh.write(f"## {item['rank']}. {item['title']}\n\n")
                  for key in FIELDS:
                      if key == "rank" or key == "title":
                          continue
                      label = key.replace("_", " ").title()
                      fh.write(f"- {label}: {item.get(key, '')}\n")
                  fh.write("\n")

          print("=== RADAR_TOP20_DETAIL_BEGIN ===")
          for item in detailed:
              for key in FIELDS:
                  label = key.upper()
                  print(f"{label}: {item.get(key, '')}")
              print("---")
          print("=== RADAR_TOP20_DETAIL_END ===")
          PY
      - name: Upload detailed preview artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: topic-relevance-top20-detail
          path: |
            top20_detail.json
            top20_detail.md
          if-no-files-found: error
      - name: Publish compact preview statuses
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import ast, os, re, requests
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          run_url = f"https://github.com/{repo}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          url = f"https://api.github.com/repos/{repo}/statuses/{sha}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          try:
              lines = open("preview.log", encoding="utf-8").read().splitlines()
          except FileNotFoundError:
              lines = []

          def compact(text, limit=105):
              text = " ".join(str(text or "").split())
              return text[:limit]

          def status(context, description="ok", state="success"):
              payload = {
                  "state": state,
                  "context": context[:250],
                  "description": compact(description, 130),
                  "target_url": run_url,
              }
              response = requests.post(url, headers=headers, json=payload, timeout=20)
              response.raise_for_status()

          metrics = {"pmids":"?", "details":"?", "unique":"?", "passed":"?", "filtered":"?", "new":"?"}
          tier_counts = {}
          for line in lines:
              if m := re.search(r"Total unique PMIDs after merge: (\d+)", line): metrics["pmids"] = m.group(1)
              if m := re.search(r"Fetched details for (\d+) papers", line): metrics["details"] = m.group(1)
              if m := re.search(r"Filter audit: (\d+) unique papers, (\d+) passed, (\d+) filtered out", line):
                  metrics["unique"], metrics["passed"], metrics["filtered"] = m.groups()
              if m := re.search(r"History filter: \d+ total .* (\d+) new", line): metrics["new"] = m.group(1)
              if "Topic tier counts:" in line:
                  raw = line.split("Topic tier counts:", 1)[1].strip()
                  try:
                      tier_counts = ast.literal_eval(raw)
                  except Exception:
                      tier_counts = {}

          scores = {}
          for line in lines:
              if m := re.search(r"\[(\d+)\]\s+([0-9.]+) pts \| (.*)", line):
                  scores[int(m.group(1))] = m.group(2)

          items = []
          current = None
          for raw in lines:
              line = raw.rstrip()
              m = re.match(r"\[\s*(\d+)\]\s+(.*)", line)
              if m:
                  if current: items.append(current)
                  current = {"rank": int(m.group(1)), "title": m.group(2).strip()}
                  continue
              if not current:
                  continue
              s = line.strip()
              if not s:
                  continue
              if s.startswith("tier:"):
                  current["tier"] = s[len("tier:"):].strip()
              elif s.startswith("tags:"):
                  current["tier"] = " | tags: " + s[len("tags:"):].strip()
              elif s.startswith("why:"):
                  current["why"] = s[len("why:"):].strip()
              elif " | citations: " in s:
                  current["journal"] = s
          if current: items.append(current)

          meta = f"radar-topic/meta pmids={metrics['pmids']} details={metrics['details']} passed={metrics['passed']} filtered={metrics['filtered']} new={metrics['new']} no-push"
          status(meta, "topic relevance preview summary")
          if tier_counts:
              tiers = " ".join(f"{k}={v}" for k, v in sorted(tier_counts.items()))
              status(f"radar-topic/tiers {compact(tiers, 210)}", "topic tier counts")
          if not items:
              status("radar-topic/error no-ranked-papers", "preview log did not contain ranked papers", "failure")
          for item in items[:20]:
              rank = item["rank"]
              score = scores.get(rank, "?")
              title = compact(item.get("title", ""), 76)
              tier = compact(item.get("tier", ""), 50)
              journal = compact(item.get("journal", ""), 55)
              context = f"radar-topic/{rank:02d} s={score} {title} | {tier} | {journal}"
              status(context, compact(item.get("why", "ranked paper"), 130))
          PY
