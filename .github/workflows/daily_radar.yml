name: Prosocial Research Radar — Daily Run

on:
  # ── Scheduled trigger ─────────────────────────────────────
  # UTC 00:00 = Beijing 08:00 (UTC+8)
  # Change the time here to suit your timezone:
  #   06:00 UTC = 14:00 Beijing | 02:00 UTC = 10:00 Beijing
  schedule:
    - cron: "0 0 * * *"

  # ── Manual trigger (run anytime from GitHub Actions tab) ──────────────────
  workflow_dispatch:
    inputs:
      top:
        description: "Number of top papers to summarize and push"
        default: "8"
        required: false
      no_ai:
        description: "Skip AI summarization? (true/false)"
        default: "false"
        required: false

# Prevent two runs from stepping on each other
concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Allow the job to push changes back to the repo
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can commit back
          fetch-depth: 0

      # ── 2. Python setup ─────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Run radar ────────────────────────────────────────
      - name: Run Prosocial Research Radar
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          TOP="${{ github.event.inputs.top || '8' }}"
          NO_AI="${{ github.event.inputs.no_ai || 'false' }}"

          CMD="python run_radar.py --top $TOP"
          if [ "$NO_AI" = "true" ]; then
            CMD="$CMD --no-ai"
          fi

          echo "Running: $CMD"
          $CMD

      # ── 4. Persist history & outputs back to repo ─────────────────────────
      - name: Commit history and outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage history and output files if they changed
          git add data/sent_history.json outputs/ 2>/dev/null || true

          # Only commit if there is something to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily radar run $(date -u +%Y-%m-%d)"
            git push
          fi
