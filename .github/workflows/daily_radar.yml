name: Prosocial Research Radar - Daily Run

on:
  # Scheduled trigger: UTC 00:00 = Beijing 08:00 (UTC+8)
  schedule:
    - cron: "0 0 * * *"

  # Manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      top:
        description: "Number of top papers to summarize and push"
        default: "8"
        required: false
      no_ai:
        description: "Skip AI summarization? (true/false)"
        default: "false"
        required: false

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Prosocial Research Radar
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GITHUB_TOKEN:       ${{ github.token }}
        run: |
          TOP="${{ github.event.inputs.top || '8' }}"
          NO_AI="${{ github.event.inputs.no_ai || 'false' }}"

          CMD="python run_radar.py --top $TOP"
          if [ "$NO_AI" = "true" ]; then
            CMD="$CMD --no-ai"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Upload full candidate audit
        uses: actions/upload-artifact@v4
        with:
          name: all-candidates-${{ github.run_id }}
          path: |
            outputs/all_candidates_*.csv
            outputs/all_candidates_*.json
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit history and compact outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          [ -f data/sent_history.json ] && git add data/sent_history.json
          [ -f data/feedback.json ] && git add data/feedback.json
          for pattern in outputs/new_papers_*.csv outputs/new_papers_*.json outputs/digest_*.md outputs/run_report_*.json; do
            for file in $pattern; do
              [ -e "$file" ] && git add "$file"
            done
          done

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily radar run $(date -u +%Y-%m-%d)"
            git push
          fi
