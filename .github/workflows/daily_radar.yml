name: Prosocial Research Radar - Daily Run

on:
  # Temporary branch-only push trigger for validating this feature branch.
  push:
    branches:
      - codex/research-efficiency-upgrades

  # UTC 00:00 = Beijing 08:00 (UTC+8)
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:
    inputs:
      top:
        description: "Number of top papers to summarize and push"
        default: "8"
        required: false
      no_ai:
        description: "Skip AI summarization? (true/false)"
        default: "false"
        required: false

concurrency:
  group: radar
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Prosocial Research Radar
        env:
          DEEPSEEK_API_KEY:   ${{ secrets.DEEPSEEK_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          TOP="${{ github.event.inputs.top || '8' }}"
          NO_AI="${{ github.event_name == 'push' && 'true' || github.event.inputs.no_ai || 'false' }}"

          CMD="python run_radar.py --top $TOP"
          if [ "$NO_AI" = "true" ]; then
            CMD="$CMD --no-ai"
          fi

          echo "Running: $CMD"
          $CMD

      - name: Commit history and outputs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/sent_history.json outputs/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily radar run $(date -u +%Y-%m-%d)"
            git push
          fi
