      - '\bcooperation\b'
      - '\bcooperative\b'
    economic_games:
      - '\btrust game\b'
      - '\bdictator game\b'
      - '\bultimatum game\b'
      - '\bpublic goods\b'
    development:
      - '\bchild\b'
      - '\bchildren\b'
      - '\badolescent\b'
      - '\bdevelopment\b'
      - '\binfant\b'
    neuroscience:
      - '\bfmri\b'
      - '\beeg\b'
      - '\bneuroimaging\b'
      - '\bneural\b'
      - '\bbrain\b'
    decision_making:
      - '\bdecision[- ]making\b'
      - '\bsocial decision\b'
